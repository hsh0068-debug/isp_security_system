version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16
    container_name: isp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: isp_security
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: isp_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:admin1234@db:5432/isp_security
    depends_on:
      - db
    restart: always

  # React Dashboard
  frontend:
    build: ./dashboard
    container_name: isp_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data: